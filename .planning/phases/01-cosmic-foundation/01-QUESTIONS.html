<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 01: cosmic-foundation — Discussion Questions</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #22c55e;
            --border-color: #334155;
            --highlight-color: #f0fdf4;
            --highlight-border: #22c55e;
            --warning-color: #f97316;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .stats-bar {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 30px;
            position: sticky;
            top: 20px;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            display: block;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .progress-container {
            width: 200px;
            height: 12px;
            background: var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-header {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 20px;
            transition: background 0.2s;
        }

        .section-header:hover {
            background: #2d3a4f;
        }

        .section-header h2 {
            margin: 0;
            font-size: 1.25rem;
        }

        .section-count {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .questions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .question-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }

        .question-card.answered {
            border-color: var(--highlight-border);
            background: #1a2e25; /* Dark green tint for dark mode */
        }

        .q-id {
            display: inline-block;
            padding: 2px 8px;
            background: var(--border-color);
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--text-secondary);
        }

        .q-title {
            font-size: 1.125rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .q-context {
            font-style: italic;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .option-item:hover {
            background: #2d3a4f;
        }

        .option-item input {
            margin-top: 4px;
        }

        .option-label {
            font-weight: bold;
            display: block;
        }

        .option-desc {
            display: block;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .chat-more {
            width: 100%;
            min-height: 80px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            padding: 10px;
            font-family: inherit;
            font-size: 0.875rem;
            resize: vertical;
            box-sizing: border-box;
        }

        .chat-more:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .chat-more.has-content {
            border-color: var(--warning-color);
        }

        .save-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(34, 197, 94, 0.4);
            transition: transform 0.2s, background 0.2s;
            z-index: 1000;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            background: #4ade80;
        }

        .save-btn:active {
            transform: translateY(0);
        }

        .instructions {
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 20px;
            margin-bottom: 80px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Phase 01: cosmic-foundation — Discussion Questions</h1>
            <div class="stats-bar" id="statsBar">
                <div class="stat-item">
                    <span class="stat-value" id="totalCount">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="answeredCount">0</span>
                    <span class="stat-label">Answered</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="remainingCount">0</span>
                    <span class="stat-label">Remaining</span>
                </div>
                <div class="stat-item">
                    <div class="progress-container">
                        <div class="progress-fill" id="progressBar"></div>
                    </div>
                </div>
            </div>
        </header>

        <div id="sectionsContainer"></div>

        <div class="instructions">
            After answering, click "Save answers" — or download the JSON and replace the original file.<br>
            Then return to the agent and say "refresh" to process your answers.
        </div>
    </div>

    <button class="save-btn" onclick="saveAnswers()">Save answers</button>

    <script>
        // Embedded state to avoid CORS issues with file:// protocol
        let state = {
  "phase": "01-cosmic-foundation",
  "generated_at": "2026-04-15T10:00:00Z",
  "stats": {
    "total": 3,
    "answered": 3,
    "chat_more": 0,
    "remaining": 0
  },
  "sections": [
    {
      "id": "visual-theme",
      "title": "Visual Theme",
      "questions": [
        {
          "id": "Q-01",
          "title": "Cosmic Color Palette",
          "context": "Requirement THEME-01. This defines the foundation for all subsequent visual polish.",
          "options": [
            {
              "id": "a",
              "label": "Deep Space",
              "description": "Deep purples, dark blues, neon cyan accents. Classic 'high-tech cosmic' feel."
            },
            {
              "id": "b",
              "label": "Stellar Nursery",
              "description": "Magenta, indigo, gold accents. More vibrant and ethereal."
            },
            {
              "id": "c",
              "label": "Void Ethereal",
              "description": "Near-black, soft violets, ghostly white accents. Minimalist and mysterious."
            },
            {
              "id": "custom",
              "label": "Custom",
              "description": ""
            }
          ],
          "answer": "c",
          "chat_more": "",
          "status": "answered"
        }
      ]
    },
    {
      "id": "background-fx",
      "title": "Background FX",
      "questions": [
        {
          "id": "Q-02",
          "title": "Nebula Generation Method",
          "context": "Requirement THEME-02. Replaces the static background.jpg with procedural art.",
          "options": [
            {
              "id": "a",
              "label": "Radial Gradient Noise",
              "description": "Multi-layered radial gradients with simulated noise. Soft, gaseous, and high-performance."
            },
            {
              "id": "b",
              "label": "Perlin Noise Cloud",
              "description": "True Perlin noise mapped to cosmic colors. More structured and organic, slightly more complex to implement."
            },
            {
              "id": "c",
              "label": "Animated Particle Wash",
              "description": "A static base with a slow-moving, low-opacity particle layer. Adds depth and movement."
            },
            {
              "id": "custom",
              "label": "Custom",
              "description": ""
            }
          ],
          "answer": "a",
          "chat_more": "",
          "status": "answered"
        }
      ]
    },
    {
      "id": "technical-stability",
      "title": "Technical Stability",
      "questions": [
        {
          "id": "Q-03",
          "title": "Tween Cleanup Strategy",
          "context": "Requirement ANIM-05. Prevents visual corruption when Bug entities are reused from the pool.",
          "options": [
            {
              "id": "a",
              "label": "Phaser Tween Manager",
              "description": "Use this.scene.tweens.killTweensOf(this). The standard Phaser way; clean and reliable."
            },
            {
              "id": "b",
              "label": "Explicit Tracking",
              "description": "Store active tweens in an array and stop them manually. More control, but more boilerplate."
            },
            {
              "id": "c",
              "label": "Tween-specific tags",
              "description": "Use tags to target only animation tweens, leaving other system tweens untouched."
            },
            {
              "id": "custom",
              "label": "Custom",
              "description": ""
            }
          ],
          "answer": "a",
          "chat_more": "",
          "status": "answered"
        }
      ]
    }
  ]
};

        function render() {
            const container = document.getElementById('sectionsContainer');
            container.innerHTML = '';

            state.sections.forEach(section => {
                const sectionEl = document.createElement('div');
                sectionEl.className = 'section';

                const answeredInSection = section.questions.filter(q => q.answer).length;

                sectionEl.innerHTML = `
                    <div class="section-header" onclick="toggleSection('${section.id}')">
                        <h2>${section.title}</h2>
                        <span class="section-count">${answeredInSection}/${section.questions.length} answered</span>
                    </div>
                    <div class="questions-grid" id="grid-${section.id}">
                        ${section.questions.map(q => renderQuestion(q)).join('')}
                    </div>
                `;
                container.appendChild(sectionEl);
            });

            updateStats();
        }

        function renderQuestion(q) {
            const isAnswered = q.answer !== null && q.answer !== '';
            const hasContent = q.chat_more && q.chat_more.length > 0;

            return `
                <div class="question-card ${isAnswered ? 'answered' : ''}" id="card-${q.id}">
                    <span class="q-id">${q.id}</span>
                    <div class="q-title">${q.title}</div>
                    <div class="q-context">${q.context}</div>
                    <div class="options-list">
                        ${q.options.map(opt => `
                            <label class="option-item">
                                <input type="radio" name="${q.id}" value="${opt.id}" ${q.answer === opt.id ? 'checked' : ''} 
                                       onchange="updateAnswer('${q.id}', this.value)">
                                <div>
                                    <span class="option-label">${opt.label}</span>
                                    ${opt.description ? `<span class="option-desc">${opt.description}</span>` : ''}
                                </div>
                            </label>
                        `).join('')}
                    </div>
                    <textarea class="chat-more ${hasContent ? 'has-content' : ''}" 
                              placeholder="Add context, nuance, or clarification for this question..."
                              oninput="updateChatMore('${q.id}', this.value)">${q.chat_more || ''}</textarea>
                </div>
            `;
        }

        function toggleSection(id) {
            const grid = document.getElementById(`grid-${id}`);
            grid.classList.toggle('hidden');
        }

        function updateAnswer(qId, value) {
            let question;
            state.sections.forEach(s => {
                const q = s.questions.find(q => q.id === qId);
                if (q) question = q;
            });

            if (question) {
                question.answer = value;
                question.status = 'answered';
                
                const card = document.getElementById(`card-${qId}`);
                card.classList.add('answered');
                updateStats();
            }
        }

        function updateChatMore(qId, value) {
            let question;
            state.sections.forEach(s => {
                const q = s.questions.find(q => q.id === qId);
                if (q) question = q;
            });

            if (question) {
                question.chat_more = value;
                if (!question.answer && value.length > 0) {
                    question.status = 'chat-more';
                }
                
                const textarea = document.querySelector(`#card-${qId} textarea`);
                if (value.length > 0) {
                    textarea.classList.add('has-content');
                } else {
                    textarea.classList.remove('has-content');
                }
                updateStats();
            }
        }

        function updateStats() {
            let total = 0;
            let answered = 0;
            let chatMore = 0;

            state.sections.forEach(s => {
                s.questions.forEach(q => {
                    total++;
                    if (q.answer) answered++;
                    if (q.chat_more) chatMore++;
                });
            });

            document.getElementById('totalCount').innerText = total;
            document.getElementById('answeredCount').innerText = answered;
            document.getElementById('remainingCount').innerText = total - answered;
            
            const progress = (answered / total) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
        }

        async function saveAnswers() {
            const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '01-QUESTIONS.json';
            a.click();
            URL.revokeObjectURL(url);
            alert('JSON file generated. Please replace the original file in .planning/phases/01-cosmic-foundation/01-QUESTIONS.json');
        }

        render();
    </script>
</body>
</html>
